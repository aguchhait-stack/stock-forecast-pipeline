version: '3.8'

services:
  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stock_db
    volumes:
      - ./sql:/app/sql
      - ./src:/app/src
      - ./.env:/app/.env

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
