name: Daily Stock Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py
      - name: Commit and push updated plots
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs/*.png
          git commit -m "Auto-update stock plots [skip ci]" || echo "No changes to commit"
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: outputs/